/* =========================

/* =========================
   ROOT
========================= */
:root{
    --pink:#ff4fa3;
    --purple:#7c4dff;
    --bg:#f5f6fa;
    --card:#ffffff;
    --text:#222;
    --border:#e5e5e5;
}

/* =========================
   BODY
========================= */
body{
    font-family:'Poppins',sans-serif;
    background:var(--bg);
    color:var(--text);
    margin:0;
    overflow-x:hidden;
}

/* =========================
   SIDEBAR
========================= */
.sidebar{
    width:280px;
    height:100vh;
    position:fixed;
    top:0;
    left:0;
    background:#fff;
    padding:20px;
    overflow-y:auto;
    z-index:999;
    transition:.3s;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.sidebar.show{
    left:0;
}

/* =========================
   MAIN CONTENT
========================= */
.main-content{
    margin-left:280px;
    padding:25px;
    transition:.3s;
}



/* =========================
   BUTTONS
========================= */
.btn-pink{
    background:linear-gradient(
        135deg,
        var(--pink),
        var(--purple)
    );
    color:#fff;
    border:none;
    border-radius:12px;
    padding:12px;
    font-weight:600;
    transition:.3s;
}

.btn-pink:hover{
    transform:translateY(-2px);
}

/* =========================
   PROFILE
========================= */
.admin-profile{
    background:#fff;
    padding:12px;
    border-radius:18px;
    display:flex;
    align-items:center;
    gap:12px;
    box-shadow:0 5px 20px rgba(0,0,0,.06);
}

.admin-profile img{
    width:55px;
    height:55px;
    border-radius:50%;
    border:3px solid var(--pink);
}

/* =========================
   SEARCH
========================= */
.search-box input,
#search{
    width:100%;
    height:50px;
    border:1px solid #ddd;
    border-radius:12px;
    padding:0 15px;
    outline:none;
}

/* =========================
   TABLE
========================= */
.table-box{
    background:#fff;
    border-radius:20px;
    padding:20px;
    overflow-x:auto;
    box-shadow:0 5px 20px rgba(0,0,0,.05);
}

table{
    width:100%;
    border-collapse:collapse;
}

th,
td{
    padding:14px;
    border-bottom:1px solid #eee;
}

th{
    font-weight:700;
}

/* =========================
   MODAL
========================= */
.modal-content{
    border:none;
    border-radius:20px;
}

.modal-content input{
    width:100%;
    margin-bottom:12px;
}

/* =========================
   DARK MODE
========================= */
[data-bs-theme="dark"]{
    --bg:#121212;
    --card:#1f1f1f;

<script>

let customers = [
{
    name:"Ravi Kumar",
    phone:"9876543210",
    email:"ravi@gmail.com",
    orders:[
        {item:"Classic Milk Tea", price:120},
        {item:"Brown Sugar Boba", price:180}
    ]
},
{
    name:"Priya Sharma",
    phone:"9123456780",
    email:"priya@gmail.com",
    orders:[
        {item:"Strawberry Boba", price:150}
    ]
}
];

let selectedIndex = null;

/* ================= RENDER ================= */
function renderTable(data = customers){

    let table = document.getElementById("tableBody");
    table.innerHTML = "";

    data.forEach((c, index) => {

        let orderHTML = "";
        let total = 0;

        c.orders.forEach(o=>{
            total += o.price;
            orderHTML += `<div>🧋 ${o.item} - ₹${o.price}</div>`;
        });

        table.innerHTML += `
        <tr>
            <td>${c.name}</td>
            <td>${c.phone}</td>
            <td>${c.email}</td>

            <td>
                <div class="order-box">
                    ${orderHTML}
                </div>
            </td>

            <td><b>₹${total}</b></td>

            <td>
                <button class="btn btn-success btn-sm" onclick="openOrder(${index})">
                    + Add Order
                </button>

                <button class="btn btn-danger btn-sm" onclick="deleteCustomer(${index})">
                    Delete
                </button>
            </td>
        </tr>
        `;
    });
}

/* ================= CUSTOMER ================= */
function addCustomer(){
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let email = document.getElementById("email").value;

    if(name && phone && email){
        customers.push({name, phone, email, orders:[]});
        renderTable();
        closeModal();
    }
}

function deleteCustomer(index){
    customers.splice(index,1);
    renderTable();
}

/* ================= ORDER ================= */
function openOrder(index){
    selectedIndex = index;
    document.getElementById("orderModal").style.display = "block";
}

function addOrder(){

    let item = document.getElementById("itemName").value;
    let price = Number(document.getElementById("itemPrice").value);

    if(item && price){

        customers[selectedIndex].orders.push({
            item,
            price
        });

        renderTable();
        closeOrder();
    }
}

function closeOrder(){
    document.getElementById("orderModal").style.display = "none";
}

/* ================= MODAL ================= */
function openModal(){
    document.getElementById("modal").style.display="block";
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

/* ================= SEARCH ================= */
function searchCustomer(){

    let value = document.getElementById("search").value.toLowerCase();

    let filtered = customers.filter(c =>
        c.name.toLowerCase().includes(value) ||
        c.phone.includes(value) ||
        c.email.toLowerCase().includes(value)
    );

    renderTable(filtered);
}

renderTable();

</script>
