        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body{
            background: #f7f5ff;
            overflow-x: hidden;
        }

        :root{
            --primary:#ff4fa3;
            --secondary:#7c4dff;
            --dark:#1f1f1f;
            --light:#ffffff;
        }

        /* =========================================
           SIDEBAR
        ========================================= */

    

      
        .sidebar-menu{
            list-style: none;
            padding: 0;
        }

        .sidebar-menu li{
            margin-bottom: 12px;
        }

        .sidebar-menu a{
            text-decoration: none;
            color: #555;
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 18px;
            border-radius: 18px;
            transition: .3s;
            font-weight: 500;
        }

        .sidebar-menu a:hover,
        .sidebar-menu .active{
            background: linear-gradient(135deg,var(--primary),var(--secondary));
            color: #fff;
        }

        /* =========================================
           MAIN CONTENT
        ========================================= */

      

        /* =========================================
           TOPBAR
        ========================================= */

        .topbar{
            background: #fff;
            padding: 18px 25px;
            border-radius: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,.05);
        }

        .search-box{
            width: 350px;
            position: relative;
        }

        .search-box input{
            width: 100%;
            height: 52px;
            border: none;
            background: #f4f4f4;
            border-radius: 50px;
            padding: 0 50px 0 20px;
            outline: none;
        }

        .search-box i{
            position: absolute;
            right: 18px;
            top: 18px;
            color: #777;
        }

        .admin-box{
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .admin-box img{
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* =========================================
           HERO SECTION
        ========================================= */

        .hero-dashboard{
            background: linear-gradient(135deg,#ff69b4,#7c4dff);
            padding: 50px;
            border-radius: 35px;
            position: relative;
            overflow: hidden;
            color: #fff;
            margin-bottom: 30px;
        }

        .hero-dashboard::before{
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,.08);
            border-radius: 50%;
            top: -120px;
            right: -120px;
        }

        .hero-badge{
            background: rgba(255,255,255,.15);
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            backdrop-filter: blur(10px);
        }

        .hero-title{
            font-size: 3.2rem;
            font-weight: 800;
            margin-top: 25px;
            line-height: 1.2;
        }

        .hero-title span{
            color: #ffe082;
        }

        .hero-subtitle{
            margin-top: 15px;
            font-size: 16px;
            line-height: 1.8;
            max-width: 650px;
            color: rgba(255,255,255,.9);
        }

        .hero-buttons{
            display: flex;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .hero-btn-primary{
            background: #fff;
            color: #7c4dff;
            border: none;
            border-radius: 50px;
            padding: 14px 30px;
            font-weight: 600;
            transition: .3s;
        }

        .hero-btn-outline{
            border: 2px solid rgba(255,255,255,.4);
            color: #fff;
            border-radius: 50px;
            padding: 14px 30px;
            font-weight: 600;
        }

        .hero-dashboard img{
            max-height: 320px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,.2);
        }

        /* =========================================
           DASHBOARD CARDS
        ========================================= */

        .dashboard-card{
            background: #fff;
            border-radius: 28px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,.05);
            transition: .4s;
            height: 100%;
        }

        .dashboard-card:hover{
            transform: translateY(-8px);
        }

        .icon-box{
            width: 75px;
            height: 75px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 30px;
            margin-bottom: 20px;
        }

        .pink{
            background: linear-gradient(135deg,#ff4fa3,#ff8cc7);
        }

        .purple{
            background: linear-gradient(135deg,#7c4dff,#aa8cff);
        }

        .orange{
            background: linear-gradient(135deg,#ff9800,#ffc46b);
        }

        .blue{
            background: linear-gradient(135deg,#29b6f6,#74d8ff);
        }

        /* =========================================
           CHART
        ========================================= */

        .chart-box{
            background: #fff;
            border-radius: 30px;
            padding: 30px;
            margin-top: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,.05);
        }

        .chart-placeholder{
            height: 300px;
            border-radius: 25px;
            background: linear-gradient(180deg,
                    rgba(255,79,163,.2),
                    rgba(124,77,255,.05));
            overflow: hidden;
            position: relative;
        }

        .chart-line{
            width: 100%;
            height: 100%;
            position: absolute;
        }

        /* =========================================
           TABLE
        ========================================= */

        .order-table{
            background: #fff;
            border-radius: 30px;
            padding: 30px;
            margin-top: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,.05);
        }

        table{
            width: 100%;
        }

        table tr{
            border-bottom: 1px solid #eee;
        }

        table td{
            padding: 18px 0;
        }

        .status{
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
        }

        .completed{
            background: #d4f8e8;
            color: #00a651;
        }

        .pending{
            background: #ffe0ea;
            color: #ff4fa3;
        }

        /* =========================================
           TOP DRINKS
        ========================================= */

        .drink-item{
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .drink-item img{
            width: 70px;
            height: 70px;
            border-radius: 20px;
            object-fit: cover;
        }

        /* =========================================
           REVIEWS
        ========================================= */

        .review-item{
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .review-user{
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* =========================================
           DARK MODE
        ========================================= */

        [data-bs-theme="dark"] body{
            background: #121212;
        }

        [data-bs-theme="dark"] .sidebar,
        [data-bs-theme="dark"] .topbar,
        [data-bs-theme="dark"] .dashboard-card,
        [data-bs-theme="dark"] .chart-box,
        [data-bs-theme="dark"] .order-table{
            background: #1f1f1f;
            color: #fff;
        }

        [data-bs-theme="dark"] .search-box input{
            background: #2b2b2b;
            color: #fff;
        }

        [data-bs-theme="dark"] .sidebar-menu a{
            color: #ddd;
        }

        [data-bs-theme="dark"] table tr,
        [data-bs-theme="dark"] .drink-item,
        [data-bs-theme="dark"] .review-item{
            border-color: #333;
        }

        [data-bs-theme="dark"] .text-muted{
            color: #cfcfcf !important;
        }

        /* =========================================
           RESPONSIVE
        ========================================= */

        @media(max-width:991px){

            .sidebar{
                width: 100%;
                height: auto;
                position: relative;
            }

            .main-content{
                margin-left: 0;
            }

            .topbar{
                flex-direction: column;
                gap: 20px;
            }

            .search-box{
                width: 100%;
            }

            .hero-title{
                font-size: 2.3rem;
            }

        }

   <script>

const profileInput = document.getElementById('profileInput');
const profilePreview = document.getElementById('profilePreview');

const adminName = document.getElementById('adminName');
const displayName = document.getElementById('displayName');

/* IMAGE PREVIEW */

profileInput.addEventListener('change', function () {

    const file = this.files[0];

    if (file) {

        const reader = new FileReader();

        reader.onload = function (e) {

            profilePreview.src = e.target.result;

            /* SAVE IMAGE */

            localStorage.setItem(
                "adminProfileImage",
                e.target.result
            );

        }

        reader.readAsDataURL(file);

    }

});

/* LIVE NAME */

adminName.addEventListener('keyup', function () {

    displayName.innerText = this.value;

});

/* SAVE PROFILE */

function updateProfile() {

    localStorage.setItem(
        "adminName",
        adminName.value
    );

    alert('Profile Updated Successfully');

}

/* LOAD SAVED DATA */

window.onload = function () {

    const savedName =
        localStorage.getItem("adminName");

    const savedImage =
        localStorage.getItem("adminProfileImage");

    if(savedName){

        adminName.value = savedName;
        displayName.innerText = savedName;

    }

    if(savedImage){

        profilePreview.src = savedImage;

    }

}

</script>
