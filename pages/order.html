body{
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#fff7fb,#f3f0ff);
}



/* HEADER */
.header{
    background: linear-gradient(135deg,#ff4fa3,#7c4dff);
    color:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:15px;
}

/* STATS */

.stats{

    display:grid;

    grid-template-columns:repeat(3,1fr);

    gap:20px;

    margin-top:20px;
}

/* CARD */

.stat-card{

    background:var(--card);

    border:1px solid var(--border);

    border-radius:20px;

    padding:25px;

    text-align:center;

    box-shadow:0 10px 30px rgba(0,0,0,.08);

    transition:.3s;
}

.stat-card:hover{

    transform:translateY(-5px);
}

/* TEXT */

.stat-card h4{

    color:var(--muted);

    margin-bottom:10px;

    font-size:14px;
    letter-spacing:1px;
}

.stat-card span{

    font-size:2rem;

    font-weight:800;

    color:var(--text);
}

/* GRADIENT NUMBER (optional highlight) */

.stat-card span span{

    background:linear-gradient(
        135deg,
        #7c3aed,
        #06b6d4
    );
    background-clip:text;

    -webkit-background-clip:text;
    color:transparent;

    -webkit-text-fill-color:transparent;
}

@media(max-width:991px){

    .stats{

        grid-template-columns:repeat(2,1fr);
    }
}

@media(max-width:576px){

    .stats{

        grid-template-columns:1fr;
    }

    .stat-card{

        padding:20px;
    }
}

    background:white;

<script>

let orders = JSON.parse(localStorage.getItem("orders")) || [];

/* SAVE */
function save(){
    localStorage.setItem("orders", JSON.stringify(orders));
}

/* ADD ORDER + BILL */
function addOrder(){

    let customer = document.getElementById("customer").value;
    let item = document.getElementById("item").value;
    let price = Number(document.getElementById("price").value);

    if(!customer || !item || !price) return;

    let order = {
        id: crypto.randomUUID(),
        customer,
        item,
        price,
        status:"pending",
        time:new Date().toLocaleString()
    };

    orders.unshift(order);
    save();
    render();

    showBill(order); // mini bill

    document.getElementById("customer").value="";
    document.getElementById("item").value="";
    document.getElementById("price").value="";
}

/* MINI BILL */
function showBill(o){

    document.getElementById("bCustomer").innerText = o.customer;
    document.getElementById("bItem").innerText = o.item;
    document.getElementById("bPrice").innerText = o.price;
    document.getElementById("bTotal").innerText = o.price;

    document.getElementById("billModal").style.display="flex";
}

function closeBill(){
    document.getElementById("billModal").style.display="none";
}

function printBill(){
    window.print();
}

/* MARK DELIVERED */
function mark(id){
    let o = orders.find(x => x.id === id);
    if(o){
        o.status = "delivered";
        save();
        render();
    }
}

/* DELETE */
function del(id){
    orders = orders.filter(o => o.id !== id);
    save();
    render();
}

/* STATS */
function updateStats(){

    document.getElementById("total").innerText = orders.length;

    document.getElementById("pending").innerText =
        orders.filter(o => o.status === "pending").length;

    let revenue = orders
        .filter(o => o.status === "delivered")
        .reduce((sum,o) => sum + o.price, 0);

    document.getElementById("revenue").innerText = revenue;
}

/* RENDER */
function render(){

    let box = document.getElementById("list");
    box.innerHTML = "";

    updateStats();

    orders.forEach(o => {

        box.innerHTML += `
        <div class="card">
            <h5>👤 ${o.customer}</h5>
            <p>🧋 ${o.item} - ₹${o.price}</p>
            <p>⏰ ${o.time}</p>

            <span class="${o.status}">${o.status}</span>

            <br><br>

            ${o.status === "pending" ? `
            <button class="btn btn-success btn-sm"
                onclick="mark('${o.id}')">Deliver</button>
            ` : ""}

            <button class="btn btn-danger btn-sm"
                onclick="del('${o.id}')">Delete</button>
        </div>
        `;
    });
}

render();
</script>


  
</body>
</html>
