<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Boba Bliss | Login</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Google Fonts -->

    
<link rel="icon" type="image/x-icon" href="/assets/favicons/latte-art.png">
    <style>

        *{
            font-family:'Poppins',sans-serif;
        }

        body{
            margin:0;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
            background:linear-gradient(135deg,#ff4fa3,#7c4dff);
            position:relative;
        }

        /* FLOATING SHAPES */

        .shape{
            position:absolute;
            border-radius:50%;
            background:rgba(255,255,255,0.12);
            animation:float 8s infinite ease-in-out;
        }

        .shape1{
            width:250px;
            height:250px;
            top:-80px;
            left:-80px;
        }

        .shape2{
            width:320px;
            height:320px;
            bottom:-120px;
            right:-120px;
        }

        @keyframes float{

            0%{
                transform:translateY(0px);
            }

            50%{
                transform:translateY(20px);
            }

            100%{
                transform:translateY(0px);
            }

        }

        /* LOGIN CARD */

        .login-card{
            width:100%;
            max-width:430px;
            background:rgba(255,255,255,0.95);
            backdrop-filter:blur(10px);
            padding:45px;
            border-radius:30px;
            box-shadow:0 15px 40px rgba(0,0,0,0.15);
            position:relative;
            z-index:10;
        }

        .logo{
            font-size:45px;
            text-align:center;
            margin-bottom:10px;
            color:#ff4fa3;
        }

        .title{
            text-align:center;
            font-size:32px;
            font-weight:700;
            color:#222;
        }

        .subtitle{
            text-align:center;
            color:#777;
            margin-bottom:35px;
        }

        /* INPUT */

        .input-box{
            position:relative;
            margin-bottom:25px;
        }

        .input-box i{
            position:absolute;
            left:18px;
            top:50%;
            transform:translateY(-50%);
            color:#999;
        }

        .form-control{
            height:58px;
            border-radius:18px;
            padding-left:50px;
            border:2px solid #f1e8ff;
        }

        .form-control:focus{
            box-shadow:none;
            border-color:#ff4fa3;
        }

        /* BUTTON */

        .login-btn{
            width:100%;
            height:58px;
            border:none;
            border-radius:18px;
            background:linear-gradient(135deg,#ff4fa3,#7c4dff);
            color:#fff;
            font-size:17px;
            font-weight:600;
            transition:0.3s;
        }

        .login-btn:hover{
            transform:translateY(-4px);
            box-shadow:0 10px 25px rgba(124,77,255,0.25);
        }

        /* LINKS */

        .extra-links{
            display:flex;
            justify-content:space-between;
            margin-top:20px;
            font-size:14px;
        }

        .extra-links a{
            text-decoration:none;
            color:#7c4dff;
            font-weight:500;
        }

        /* RESPONSIVE */

        @media(max-width:576px){

            .login-card{
                margin:20px;
                padding:35px 25px;
            }

            .title{
                font-size:26px;
            }

        }

    </style>

</head>

<body>

    <!-- FLOATING SHAPES -->

    <div class="shape shape1"></div>
    <div class="shape shape2"></div>

    <!-- LOGIN CARD -->

    <div class="login-card">

        <div class="logo">
             <i class="fa-solid fa-mug-hot brand-icon"></i>

            <span>Bubble Bliss</span>
        </div>

        

        <p class="subtitle">
            Admin Dashboard Login
        </p>

        <!-- FORM -->

        <form onsubmit="loginAdmin(event)">

            <!-- EMAIL -->

            <div class="input-box">

                <i class="fa-solid fa-envelope"></i>

                <input type="email"
                       class="form-control"
                       id="email"
                       placeholder="Enter Email"
                       required>

            </div>

            <!-- PASSWORD -->

            <div class="input-box">

                <i class="fa-solid fa-lock"></i>

                <input type="password"
                       class="form-control"
                       id="password"
                       placeholder="Enter Password"
                       required>

            </div>

            <!-- BUTTON -->

            <button type="submit"
                    class="login-btn">

                <i class="fa-solid fa-right-to-bracket me-2"></i>
                Login

            </button>

        </form>

        <!-- EXTRA LINKS -->

        <div class="extra-links">

            <a href="#">
                Forgot Password?
            </a>

            <a href="#">
                Contact Support
            </a>

        </div>

    </div>

    <!-- Bootstrap -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- LOGIN SCRIPT -->

    <script>

        function loginAdmin(event){

            event.preventDefault();

            const email =
                document.getElementById(
                    "email"
                ).value;

            const password =
                document.getElementById(
                    "password"
                ).value;

            /* EMPTY CHECK */

            if(
                email === ""
                ||
                password === ""
            ){

                alert(
                    "Please Enter Email & Password"
                );

                return;
            }

            /* SAVE EMAIL */

            localStorage.setItem(
                "adminEmail",
                email
            );

            /* SUCCESS */

            alert(
                "Login Successful!"
            );

            window.location.href =
                "dashboard.html";

        }

    </script>

</body>

</html>
